site_name: Knowledge Library
site_description: Personal architecture knowledge base
docs_dir: docs
site_dir: site

site_url: https://yuvarajsfcloud.github.io/Knowledge-Library/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search

extra_css:
  - stylesheets/brand.css

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md

  - Knowledge Library:
    - knowledge/index.md
    - Architecture Development Method:
      - knowledge/adm/index.md
      - Preliminary: knowledge/adm/preliminary.md
      - A — Architecture Vision: knowledge/adm/architecture-vision.md
      - B — Business Architecture: knowledge/adm/business-architecture.md
      - C — Information Systems:
        - knowledge/adm/information-systems/index.md
        - Application Architecture: knowledge/adm/information-systems/application-architecture.md
        - Data Architecture: knowledge/adm/information-systems/data-architecture.md
      - D — Technology Architecture: knowledge/adm/technology-architecture.md
      - E — Opportunities & Solutions: knowledge/adm/opportunities-and-solutions.md
      - F — Migration Planning: knowledge/adm/migration-planning.md
      - G — Implementation Governance: knowledge/adm/implementation-governance.md
      - H — Architecture Change Management: knowledge/adm/change-management.md
      - Requirements Management: knowledge/adm/requirements-management.md
    - Reference:
      - knowledge/reference/index.md
      - Architecture Repository: knowledge/reference/architecture-repository.md
      - Enterprise Continuum: knowledge/reference/enterprise-continuum.md
      - Views & Viewpoints: knowledge/reference/views-viewpoints.md
      - Building Blocks (ABB / SBB): knowledge/reference/building-blocks.md
      - ArchiMate 3.2 Quick Reference: knowledge/reference/archimate.md
      - Frameworks Comparison: knowledge/reference/frameworks.md
      - Patterns: knowledge/reference/patterns.md
      - Tech Radar: knowledge/reference/tech-radar.md
      - Governance Framework: knowledge/reference/governance-framework.md
      - Glossary: knowledge/reference/glossary.md
    - Architecture Notes:
      - knowledge/architecture-notes/index.md
      - Event-Driven Architecture: knowledge/architecture-notes/event-driven-architecture.md
    - Decision Records (ADRs):
      - knowledge/decision-records/index.md
      - ADR-001 Shared Database: knowledge/decision-records/ADR-001-shared-database.md
      - ADR-002 Async Events: knowledge/decision-records/ADR-002-async-events.md
      - ADR-003 Database-per-Service: knowledge/decision-records/ADR-003-database-per-service.md
      - ADR-004 Terraform IaC: knowledge/decision-records/ADR-004-terraform-iac.md
      - ADR-005 OAuth / OIDC: knowledge/decision-records/ADR-005-oauth-oidc.md
      - ADR-006 GraphQL Federation: knowledge/decision-records/ADR-006-graphql-federation.md
    - Case Studies:
      - knowledge/case-studies/index.md
      - Microservices Migration: knowledge/case-studies/microservices-migration.md

  - Playbook:
    - playbook/index.md
    - Engagement Phases:
      - playbook/engagement/index.md
      - Phase 1 — Discovery: playbook/engagement/01-discovery.md
      - Phase 2 — Design: playbook/engagement/02-design.md
      - Phase 3 — Validation: playbook/engagement/03-validation.md
      - Phase 4 — Implementation: playbook/engagement/04-implementation.md
      - Phase 5 — Operate & Evolve: playbook/engagement/05-operate.md
    - Operational Playbooks:
      - playbook/operational/index.md
      - Incident Response: playbook/operational/incident-response.md
      - Technology Evaluation: playbook/operational/technology-evaluation.md
    - Checklists:
      - playbook/checklists/index.md
      - Architecture Review: playbook/checklists/architecture-review.md
      - NFR Checklist: playbook/checklists/nfr-checklist.md
    - Templates:
      - playbook/templates/index.md

# Disable features not appropriate for a private knowledge base
extra:
  generator: false   # Removes "Made with Material for MkDocs" footer link
