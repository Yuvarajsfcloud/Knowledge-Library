site_name: Knowledge Library
site_description: Personal architecture knowledge base
docs_dir: docs
site_dir: site

site_url: https://yuvarajsfcloud.github.io/Knowledge-Library/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md

  - TOGAF ADM:
    - togaf/index.md
    - Preliminary — Capability: togaf/preliminary.md
    - Phase A — Vision: togaf/phase-a-vision.md
    - Phase B — Business: togaf/phase-b-business.md
    - Phase C — Information Systems: togaf/phase-c-information.md
    - Phase D — Technology: togaf/phase-d-technology.md
    - Phase E–F — Migration: togaf/phase-ef-migration.md
    - Phase G–H — Governance: togaf/phase-gh-governance.md
    - Requirements Management: togaf/requirements-management.md

  - Architecture Concepts:
    - togaf/architecture-repository.md
    - togaf/enterprise-continuum.md
    - togaf/views-viewpoints.md
    - togaf/building-blocks.md

  - ArchiMate 3.2:
    - archimate/index.md

  - Architecture Governance:
    - governance/index.md

  - Frameworks Reference:
    - reference/frameworks.md

  - Engagement Phases (Practical):
    - phases/index.md
    - Phase 1 — Discovery: phases/01-discovery.md
    - Phase 2 — Design: phases/02-design.md
    - Phase 3 — Validation: phases/03-validation.md
    - Phase 4 — Implementation: phases/04-implementation.md
    - Phase 5 — Operate & Evolve: phases/05-operate.md

  - Architecture Notes:
    - architecture/index.md
    - Event-Driven Architecture: architecture/event-driven-architecture.md

  - Case Studies:
    - case-studies/index.md
    - Microservices Migration: case-studies/microservices-migration.md

  - Playbooks:
    - playbooks/index.md
    - Incident Response: playbooks/incident-response.md
    - Technology Evaluation: playbooks/technology-evaluation.md

  - ADRs:
    - adrs/index.md
    - ADR-001 Shared Database: adrs/ADR-001-shared-database.md
    - ADR-002 Async Events: adrs/ADR-002-async-events.md

# Disable features not appropriate for a private knowledge base
extra:
  generator: false   # Removes "Made with Material for MkDocs" footer link
