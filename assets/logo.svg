<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Knowledge Library logo">
  <defs>
    <linearGradient id="kbGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="kbGradSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#A855F7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <!-- Stacked pages -->
  <rect x="10" y="14" width="36" height="40" rx="6" fill="url(#kbGradSoft)"/>
  <rect x="16" y="10" width="38" height="44" rx="7" fill="url(#kbGrad)"/>
  <!-- Page lines -->
  <rect x="22" y="20" width="22" height="3" rx="1.5" fill="#FFFFFF" opacity="0.85"/>
  <rect x="22" y="28" width="26" height="3" rx="1.5" fill="#FFFFFF" opacity="0.65"/>
  <rect x="22" y="36" width="18" height="3" rx="1.5" fill="#FFFFFF" opacity="0.55"/>
  <!-- Spark dot -->
  <circle cx="48" cy="46" r="4" fill="#06B6D4"/>
</svg>
